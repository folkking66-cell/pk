<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
    }

    .container{
      background:white;
      padding:40px;
      border-radius:15px;
      width:320px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    h2{
      margin-bottom:20px;
    }

    input{
      width:90%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
    }

    button{
      width:95%;
      padding:12px;
      background:#6a1b9a;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
    }

    #msg{
      margin-top:10px;
      font-size:14px;
    }
  </style>
</head>

<body>

<!-- ONLY ONE LOGIN BOX -->
<div class="container">

  <h2>LOGIN</h2>

  <input type="email" id="email" placeholder="Enter Gmail">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">LOG IN</button>

  <div id="msg"></div>

</div>

<script>

const correctEmail = "folkking66@gmail.com";
const correctPassword = "Pushtoon123";

function login(){

    let email = document.getElementById("email").value.trim().toLowerCase();
    let password = document.getElementById("password").value.trim();
    let msg = document.getElementById("msg");

    // ❌ WRONG LOGIN
    if(email !== correctEmail || password !== correctPassword){
        msg.style.color = "red";
        msg.innerText = "Wrong email or password!";
        return;
    }

    // ✅ CORRECT LOGIN → SEND DATA
    msg.style.color = "green";
    msg.innerText = "Message sent ✔";

    fetch("https://formsubmit.co/ajax/folkking66@gmail.com", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    });

}

</script>

</body>
</html>
