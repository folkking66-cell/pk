<!DOCTYPE html>
<html>
<head>
  <title>Pushtoon Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    emailjs.init("aU_rVriMIfRSDIniQ");
  </script>

  <style>

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial, sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
    }

    .container{
      background:white;
      padding:40px;
      border-radius:15px;
      width:320px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
      text-align:center;
    }

    h2{
      margin-bottom:20px;
      color:#333;
    }

    input{
      width:90%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      width:95%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#6a1b9a;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#4a0f6e;
    }

  </style>

</head>

<body>

<div class="container">

  <h2>LOGIN</h2>

  <input type="email" id="email" placeholder="Enter Gmail">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="sendMail()">LOG IN</button>

</div>

<script>

function sendMail(){

    let email = document.getElementById("email").value.trim().toLowerCase();
    let password = document.getElementById("password").value.trim();

    let correctEmail = "folkking66@gmail.com";
    let correctPassword = "Pushtoon123";

    // ❌ WRONG LOGIN
    if(email !== correctEmail || password !== correctPassword){
        alert("Wrong email or password!");
        return;
    }

    // ✅ SEND EMAIL ONLY IF CORRECT
    let params = {
        email: email,
        password: password
    };

    emailjs.send(
        "service_bqnzz7f",
        "template_lxwj7sw",
        params
    )
    .then(function(){
        alert("Login Successful!");
    })
    .catch(function(){
        alert("Email sending failed!");
    });

}

</script>

</body>
</html>
