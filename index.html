<!DOCTYPE html>
<html>
<head>
  <title>Login Test</title>
</head>

<body>

<h2>LOGIN</h2>

<input id="email" placeholder="email">
<input id="password" placeholder="password">

<button onclick="login()">LOGIN</button>

<p id="msg"></p>

<script>

function login(){

  const correctEmail = "folkking66@gmail.com";
  const correctPassword = "Pushtoon123";

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  console.log("EMAIL:", email);
  console.log("PASSWORD:", password);

  if(email.trim() === correctEmail && password.trim() === correctPassword){
    document.getElementById("msg").innerText = "CORRECT ✔";
  } else {
    document.getElementById("msg").innerText = "WRONG ❌";
  }

}

</script>

</body>
</html>
