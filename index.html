<style>

body{
  margin:0;
  padding:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;

  /* softer modern background */
  background: linear-gradient(135deg, #4facfe, #00f2fe);
}

/* container kept same structure, only improved colors */
.container{
  background: rgba(255,255,255,0.15);
  padding: 40px;
  border-radius: 20px;
  width: 350px;
  text-align: center;
  box-shadow: 0px 15px 35px rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.3);
}

/* title nicer gradient color */
h2{
  color: #ffffff;
  margin-bottom: 25px;
  font-size: 36px;
  letter-spacing: 1px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

/* inputs slightly cleaner */
input{
  width: 90%;
  padding: 14px;
  margin: 12px 0;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  outline: none;
  background: rgba(255,255,255,0.85);
  transition: 0.3s;
}

input:focus{
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  transform: scale(1.02);
}

/* button improved but same function */
button{
  width: 95%;
  padding: 14px;
  border: none;
  border-radius: 12px;

  background: linear-gradient(135deg, #ff6a00, #ee0979);
  color: white;
  font-size: 20px;
  cursor: pointer;
  font-weight: bold;
  margin-top: 10px;
  transition: 0.3s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

button:hover{
  transform: scale(1.05);
  box-shadow: 0 12px 25px rgba(0,0,0,0.3);
}

</style>
